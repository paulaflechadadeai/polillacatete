<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎀 Hello Kitty Adventure - Modos Fácil & Difícil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ------ MENÚ PRINCIPAL (con brillitos) ------ */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 220, 240, 0.96);
            backdrop-filter: blur(3px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: opacity 0.5s ease;
        }

        .menu-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .menu-card {
            background: rgba(255, 245, 250, 0.9);
            border-radius: 80px 80px 60px 60px;
            padding: 30px 40px 50px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(233, 30, 99, 0.3), inset 0 1px 2px rgba(255,255,255,0.8);
            border: 3px solid #ff99bb;
            max-width: 90vw;
            animation: floatGlow 3s infinite ease-in-out;
        }

        @keyframes floatGlow {
            0% { transform: translateY(0px); box-shadow: 0 20px 40px rgba(233,30,99,0.3); }
            50% { transform: translateY(-8px); box-shadow: 0 30px 50px rgba(233,30,99,0.5); }
            100% { transform: translateY(0px); box-shadow: 0 20px 40px rgba(233,30,99,0.3); }
        }

        .logo-area {
            font-size: 2.3rem;
            margin-bottom: 10px;
        }
        .logo-img {
            max-width: 180px;
            border-radius: 50%;
            background: white;
            padding: 5px;
            box-shadow: 0 0 0 4px #ff80ab, 0 0 0 8px #fff;
        }
        h1 {
            color: #e91e63;
            text-shadow: 3px 3px 0 #fff, 5px 5px 0 #f8bbd0;
            font-size: 2.2rem;
            margin: 15px 0 5px;
        }
        .sparkle-text {
            background: linear-gradient(45deg, #ff99cc, #ff66b2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
        }
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin: 30px 0 20px;
        }
        .menu-btn {
            background: linear-gradient(145deg, #ffb7c5, #ff6f91);
            border: none;
            border-radius: 60px;
            padding: 14px 30px;
            font-size: 1.6rem;
            font-weight: bold;
            font-family: inherit;
            color: white;
            text-shadow: 2px 2px 0 #b0003a;
            box-shadow: 0 8px 0 #b0003a, 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.07s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b0003a;
        }
        .sound-btn {
            background: linear-gradient(145deg, #b39ddb, #7e57c2);
            box-shadow: 0 8px 0 #5e35b1;
            font-size: 1.2rem;
        }
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .sparkle {
            position: absolute;
            background: radial-gradient(circle, #ffdd88, #ffaa66);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 2s infinite;
        }
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        /* ------ CONTENEDOR DEL JUEGO ------ */
        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            transition: opacity 0.5s;
        }
        .hud {
            display: flex;
            gap: 15px;
            margin-bottom: 8px;
            background: rgba(255,255,240,0.9);
            padding: 6px 20px;
            border-radius: 40px;
            border: 2px solid #e91e63;
            font-weight: bold;
        }
        canvas {
            border-radius: 20px;
            border: 5px solid #ff80ab;
            box-shadow: 0 10px 25px rgba(233,30,99,0.4);
            max-width: 95vw;
            max-height: 55vh;
        }
        .controls {
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(4, 70px);
            grid-template-rows: 70px 70px;
            gap: 8px;
        }
        .btn {
            background: #ff80ab;
            border: none;
            border-radius: 50%;
            font-size: 1.8rem;
            box-shadow: 0 4px 0 #ad1457;
            transition: 0.05s linear;
            cursor: pointer;
            color: white;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn-jump { background: #42a5f5; box-shadow: 0 4px 0 #0d47a1; }
        .btn-run { background: #ffca28; color: #5d4037; }
        .info {
            margin-top: 8px;
            font-size: 0.7rem;
            background: #ffe0e7;
            padding: 4px 12px;
            border-radius: 50px;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,235,245,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            z-index: 150;
        }
        .overlay.hidden { display: none; }
        .overlay button {
            background: #ff6f91;
            border: none;
            padding: 10px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            margin-top: 15px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 0 #a03e5a;
        }
    </style>
</head>
<body>

<!-- ==================== MENÚ PRINCIPAL CON BRILLITOS ==================== -->
<div id="mainMenu" class="menu-overlay">
    <div class="menu-card">
        <div class="logo-area">
            <!-- ⚠️ CAMBIA AQUÍ TU URL DEL LOGO (imagen 1) -->
            <img id="customLogo" src="" alt="logo" class="logo-img" style="display:none;">
            <span id="fallbackLogo" class="sparkle-text">🎀 HELLO KITTY 🎀</span>
        </div>
        <h1>Adventure<br><span style="font-size:1.2rem;">Fácil ★ Difícil</span></h1>
        <div class="menu-buttons">
            <button id="easyModeBtn" class="menu-btn">🌸 Modo Fácil</button>
            <button id="hardModeBtn" class="menu-btn">⭐ Modo Difícil</button>
            <button id="menuMuteBtn" class="menu-btn sound-btn">🔊 Música: ON</button>
        </div>
        <div class="sparkles" id="sparklesContainer"></div>
    </div>
</div>

<!-- ==================== CONTENEDOR DEL JUEGO ==================== -->
<div id="gameContainer" style="display: none;">
    <div class="hud">
        <span>🍎 <span id="score">0</span></span>
        <span>🏆 Nivel <span id="level">1</span></span>
        <span>❤️ <span id="lives">3</span></span>
        <span>🎵 <span id="musicStatus">🔊</span></span>
    </div>
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="700" height="420"></canvas>
        <div id="gameOverOverlay" class="overlay hidden">
            <h2 id="goTitle">💔 Game Over</h2>
            <p id="goText">Puntuación: 0</p>
            <button onclick="restartGame()">🔄 Reintentar</button>
            <button onclick="backToMenu()">🏠 Menú</button>
        </div>
    </div>
    <div class="controls">
        <button class="btn btn-up" id="btnUp">⬆️</button>
        <button class="btn btn-jump" id="btnJump">⬆️<br>Salto</button>
        <button class="btn btn-left" id="btnLeft">◀</button>
        <button class="btn btn-down" id="btnDown">▼</button>
        <button class="btn btn-right" id="btnRight">▶</button>
        <button class="btn btn-run" id="btnRun">🏃<br>Run</button>
    </div>
    <div class="info">🖱️ Teclado: ←↑↓→ / WASD | Shift correr | Space saltar | M silenciar</div>
</div>

<script>
    // ==================== CONFIGURACIÓN DE IMÁGENES Y SONIDOS (CAMBIA AQUÍ TUS URLs) ====================
    // 💖 7 IMÁGENES PERSONALIZABLES 💖
    const ASSETS = {
        // ⚠️ 1. Personaje Hello Kitty (si no se carga, usa pixel art interno)
        kittyImg: "",      // Ej: "img/kitty.png"
        // ⚠️ 2. Manzana
        appleImg: "",
        // ⚠️ 3. Enemigo Slime
        enemySlimeImg: "",
        // ⚠️ 4. Enemigo Murciélago
        enemyBatImg: "",
        // ⚠️ 5. Enemigo Fantasma
        enemyGhostImg: "",
        // ⚠️ 6. Fondo (reemplaza el degradado)
        backgroundImg: "",
        // ⚠️ 7. Logo del menú
        logoImg: ""
    };

    // 🔊 5 SONIDOS PERSONALIZABLES (si están vacíos usa synth Web Audio)
    const SOUNDS = {
        jump: "",    // ej: "sounds/jump.mp3"
        coin: "",
        hurt: "",
        win: "",
        bgMusic: ""  // si pones ruta, se reproduce en bucle; si no, melodía procedural
    };

    // ==================== VARIABLES GLOBALES DEL JUEGO ====================
    let currentDifficulty = null;  // 'easy' o 'hard'
    let gameState = 'menu';        // menu, playing, gameover
    let score = 0, level = 1, lives = 3;
    let frameCount = 0;
    let musicEnabled = true;
    let audioCtx = null;
    let melodyInterval = null;
    let currentLevelData = null;
    let enemies = [], particles = [];
    let kittyLoaded = false, appleLoaded = false, bgLoaded = false;
    let customKittyImg = new Image();
    let customAppleImg = new Image();
    let customBgImg = new Image();
    let customSlimeImg = new Image(), customBatImg = new Image(), customGhostImg = new Image();
    let logoImgElem = new Image();

    // Player
    let player = {
        x: 60, y: 200, vx: 0, vy: 0, width: 36, height: 40,
        onGround: false, facingRight: true, invincible: 0
    };

    // Controles táctiles + teclado
    const keys = {}, touch = {};
    // Configuración de dificultad (se setea al iniciar)
    let config = {};

    // ==================== NIVELES (los originales) ====================
    const levelsEasy = [
        { platforms: [{x:0,y:380,w:700,h:40},{x:180,y:310,w:160,h:20},{x:420,y:260,w:160,h:20},{x:80,y:200,w:140,h:20},{x:520,y:170,w:140,h:20},{x:280,y:120,w:140,h:20}],
          apples: [{x:240,y:270,collected:false},{x:480,y:220,collected:false},{x:130,y:160,collected:false},{x:580,y:130,collected:false},{x:330,y:80,collected:false}],
          spikes: [{x:350,y:360,w:40}], enemies: [{platIndex:1,offset:0.5}], goal:{x:620,y:130} },
        { platforms: [{x:0,y:380,w:160,h:40},{x:200,y:340,w:130,h:20},{x:380,y:290,w:120,h:20},{x:540,y:240,w:130,h:20},{x:280,y:190,w:140,h:20},{x:60,y:150,w:130,h:20},{x:480,y:130,w:120,h:20},{x:620,y:380,w:80,h:40}],
          apples: [{x:250,y:300,collect:false},{x:420,y:250,collect:false},{x:580,y:200,collect:false},{x:340,y:150,collect:false},{x:110,y:110,collect:false},{x:520,y:90,collect:false},{x:650,y:340,collect:false}],
          spikes: [{x:160,y:360,w:40}], enemies: [{platIndex:1,offset:0.3},{platIndex:4,offset:0.6}], goal:{x:640,y:340} },
        { platforms: [{x:0,y:380,w:120,h:40},{x:160,y:340,w:100,h:20},{x:300,y:300,w:100,h:20},{x:440,y:260,w:100,h:20},{x:580,y:220,w:100,h:20},{x:80,y:210,w:110,h:20},{x:260,y:160,w:130,h:20},{x:460,y:130,w:110,h:20},{x:620,y:380,w:80,h:40}],
          apples: [{x:190,y:300,collect:false},{x:330,y:260,collect:false},{x:470,y:220,collect:false},{x:610,y:180,collect:false},{x:120,y:170,collect:false},{x:320,y:120,collect:false},{x:500,y:90,collect:false}],
          spikes: [{x:120,y:360,w:40}], enemies: [{platIndex:1,offset:0.4},{platIndex:3,offset:0.6},{platIndex:6,offset:0.3}], goal:{x:640,y:340} }
    ];
    const levelsHard = [
        { platforms: [{x:0,y:380,w:700,h:40},{x:200,y:300,w:120,h:20},{x:400,y:240,w:120,h:20},{x:100,y:180,w:100,h:20},{x:550,y:160,w:100,h:20},{x:300,y:120,w:80,h:20}],
          apples: [{x:250,y:260,collected:false},{x:450,y:200,collected:false},{x:140,y:140,collected:false},{x:600,y:120,collected:false},{x:330,y:80,collected:false}],
          spikes: [{x:320,y:360,w:60}], enemies: [{platIndex:1,offset:0.3},{platIndex:2,offset:0.7}], goal:{x:620,y:120} },
        { platforms: [{x:0,y:380,w:120,h:40},{x:180,y:340,w:100,h:20},{x:340,y:290,w:90,h:20},{x:490,y:240,w:100,h:20},{x:250,y:180,w:120,h:20},{x:50,y:140,w:100,h:20},{x:450,y:120,w:90,h:20},{x:600,y:380,w:100,h:40}],
          apples: [{x:220,y:300,collect:false},{x:380,y:250,collect:false},{x:530,y:200,collect:false},{x:300,y:140,collect:false},{x:90,y:100,collect:false},{x:490,y:80,collect:false},{x:640,y:340,collect:false}],
          spikes: [{x:120,y:360,w:60},{x:300,y:360,w:300}], enemies: [{platIndex:1,offset:0.2},{platIndex:3,offset:0.5},{platIndex:4,offset:0.8},{platIndex:6,offset:0.4}], goal:{x:640,y:340} },
        { platforms: [{x:0,y:380,w:90,h:40},{x:140,y:340,w:70,h:20},{x:260,y:300,w:70,h:20},{x:380,y:260,w:70,h:20},{x:500,y:220,w:70,h:20},{x:620,y:180,w:70,h:20},{x:100,y:200,w:80,h:20},{x:250,y:150,w:100,h:20},{x:430,y:120,w:80,h:20},{x:600,y:380,w:100,h:40}],
          apples: [{x:160,y:300,collect:false},{x:280,y:260,collect:false},{x:400,y:220,collect:false},{x:520,y:180,collect:false},{x:640,y:140,collect:false},{x:140,y:160,collect:false},{x:300,y:110,collect:false},{x:470,y:80,collect:false}],
          spikes: [{x:90,y:360,w:610}], enemies: [{platIndex:1,offset:0.3},{platIndex:3,offset:0.6},{platIndex:5,offset:0.2},{platIndex:7,offset:0.7},{platIndex:8,offset:0.4}], goal:{x:640,y:340} }
    ];

    // ==================== FUNCIONES DE SONIDO (híbrido: personalizado o sintetizador) ====================
    function playCustomSound(type) {
        if (!musicEnabled) return;
        let url = SOUNDS[type];
        if (url && url !== "") {
            let audio = new Audio(url);
            audio.volume = 0.3;
            audio.play().catch(e=>console.log("error audio",e));
        } else {
            // fallback procedural
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            if (type === 'jump') { osc.frequency.value = 300; gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.2); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(now+0.2); }
            else if (type === 'coin') { osc.frequency.value = 880; gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.15); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(now+0.15); }
            else if (type === 'hurt') { osc.frequency.value = 200; gain.gain.setValueAtTime(0.15,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.3); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(now+0.3); }
            else if (type === 'win') { [523,659,784].forEach((f,i)=> setTimeout(()=>{ let o=audioCtx.createOscillator(); o.frequency.value=f; let g=audioCtx.createGain(); g.gain.setValueAtTime(0.1,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.3); },i*120)); }
        }
    }

    // Música procedural o personalizada (si hay bgMusic)
    let bgAudio = null;
    function startBackgroundMusic() {
        if (!musicEnabled) return;
        if (SOUNDS.bgMusic && SOUNDS.bgMusic !== "") {
            if (bgAudio) bgAudio.pause();
            bgAudio = new Audio(SOUNDS.bgMusic);
            bgAudio.loop = true;
            bgAudio.volume = 0.2;
            bgAudio.play().catch(e=>console.log);
        } else {
            // melodía procedural (simple)
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let idx = 0;
            const melody = [523.25,587.33,659.25,698.46,659.25,587.33,523.25];
            if (melodyInterval) clearInterval(melodyInterval);
            melodyInterval = setInterval(()=>{
                if (!musicEnabled || gameState !== 'playing') return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.value = melody[idx%melody.length];
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.25);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime+0.25);
                idx++;
            }, 500);
        }
    }
    function stopBackgroundMusic() { if (bgAudio) { bgAudio.pause(); bgAudio.currentTime=0; } if (melodyInterval) clearInterval(melodyInterval); }

    // ==================== CARGA DE IMÁGENES PERSONALIZADAS ====================
    function loadCustomImages() {
        if (ASSETS.kittyImg) { customKittyImg.src = ASSETS.kittyImg; customKittyImg.onload = ()=>kittyLoaded=true; }
        if (ASSETS.appleImg) { customAppleImg.src = ASSETS.appleImg; customAppleImg.onload = ()=>appleLoaded=true; }
        if (ASSETS.backgroundImg) { customBgImg.src = ASSETS.backgroundImg; customBgImg.onload = ()=>bgLoaded=true; }
        if (ASSETS.enemySlimeImg) customSlimeImg.src = ASSETS.enemySlimeImg;
        if (ASSETS.enemyBatImg) customBatImg.src = ASSETS.enemyBatImg;
        if (ASSETS.enemyGhostImg) customGhostImg.src = ASSETS.enemyGhostImg;
        if (ASSETS.logoImg) { logoImgElem.src = ASSETS.logoImg; logoImgElem.onload = ()=>{ document.getElementById('fallbackLogo').style.display='none'; document.getElementById('customLogo').style.display='inline-block'; document.getElementById('customLogo').src=ASSETS.logoImg; }; }
        else { document.getElementById('customLogo').style.display='none'; }
    }

    // ==================== DIBUJADO DE ELEMENTOS (con imágenes o pixel art) ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    function drawKitty(x,y,w,h,right) {
        if (kittyLoaded && customKittyImg.complete) {
            ctx.save();
            if(!right){ ctx.translate(x+w,y); ctx.scale(-1,1); ctx.drawImage(customKittyImg,0,0,w,h); }
            else ctx.drawImage(customKittyImg,x,y,w,h);
            ctx.restore();
        } else {
            // pixel art simple
            ctx.fillStyle = '#fff0f5'; ctx.fillRect(x+4,y+4,w-8,h-8);
            ctx.fillStyle = '#000'; ctx.fillRect(x+10,y+12,4,4); ctx.fillRect(x+w-14,y+12,4,4);
            ctx.fillStyle = '#ff69b4'; ctx.fillRect(x+12,y+25,12,8);
        }
    }
    function drawApple(ax,ay, bounce) {
        if (appleLoaded && customAppleImg.complete) ctx.drawImage(customAppleImg, ax, ay+bounce, 20,20);
        else { ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc(ax+10, ay+12+bounce, 8,0,Math.PI*2); ctx.fill(); ctx.fillStyle = '#32CD32'; ctx.fillRect(ax+12, ay+4+bounce,4,8); }
    }
    function drawEnemy(e, x,y,w,h) {
        let img = null;
        if (e.type===0) img = customSlimeImg;
        else if(e.type===1) img = customBatImg;
        else img = customGhostImg;
        if (img && img.complete) ctx.drawImage(img, x, y, w, h);
        else { // fallback color
            ctx.fillStyle = e.type===0?'#4CAF50':(e.type===1?'#9C27B0':'#42A5F5');
            ctx.fillRect(x+2,y+2,w-4,h-4);
        }
    }
    function drawBackground() {
        if (bgLoaded && customBgImg.complete) ctx.drawImage(customBgImg,0,0,canvas.width,canvas.height);
        else { // gradiente
            let grad = ctx.createLinearGradient(0,0,0,canvas.height);
            grad.addColorStop(0,'#87CEEB'); grad.addColorStop(0.6,'#E0F6FF'); grad.addColorStop(0.6,'#90EE90'); grad.addColorStop(1,'#228B22');
            ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);
        }
    }

    // ==================== LÓGICA PRINCIPAL DEL JUEGO ====================
    function loadLevel(lvl, diffConfig, levelSet) {
        level = lvl;
        const data = JSON.parse(JSON.stringify(levelSet[(lvl-1)%levelSet.length]));
        currentLevelData = data;
        player.x=40; player.y=280; player.vx=0; player.vy=0; player.invincible=0;
        enemies = [];
        data.enemies.forEach(e=>{
            let plat = data.platforms[e.platIndex];
            if(plat){
                let ex = plat.x + e.offset*(plat.w-28);
                let ey = plat.y-28;
                enemies.push({ x:ex, y:ey, width:28,height:28, platform:plat, speed: (1.2+Math.random()*0.8)*diffConfig.enemySpeedMult,
                    direction:Math.random()>0.5?1:-1, type:Math.floor(Math.random()*3), update:function(){
                        if(this.type===1){ this.x+=this.speed*this.direction; this.y=this.platform.y-40+Math.sin(frameCount*0.05)*20; }
                        else{ this.x+=this.speed*this.direction; this.y=this.platform.y-this.height; }
                        if(this.x<=this.platform.x){this.x=this.platform.x; this.direction=1;}
                        if(this.x+this.width>=this.platform.x+this.platform.w){this.x=this.platform.x+this.platform.w-this.width; this.direction=-1;}
                    }, draw:function(){ drawEnemy(this, this.x, this.y, this.width, this.height); } });
            }
        });
        document.getElementById('level').textContent = level;
    }

    function startGame(difficulty) {
        currentDifficulty = difficulty;
        const diffConfig = {
            easy: { gravity:0.5, jump:-11, baseSpeed:3.5, runSpeed:6, enemySpeedMult:0.5, lives:5, invFrames:120, requireAllApples:false, dieOnFall:false, levelSet:levelsEasy },
            hard: { gravity:0.6, jump:-13, baseSpeed:3.5, runSpeed:7, enemySpeedMult:1.0, lives:3, invFrames:90, requireAllApples:true, dieOnFall:true, levelSet:levelsHard }
        }[difficulty];
        config = diffConfig;
        lives = config.lives;
        score = 0; level = 1;
        frameCount=0;
        gameState='playing';
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('gameContainer').style.display = 'flex';
        document.getElementById('gameOverOverlay').classList.add('hidden');
        updateHUD();
        loadLevel(1, config, config.levelSet);
        startBackgroundMusic();
        if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
    }

    function updateHUD() { document.getElementById('score').innerText=score; document.getElementById('lives').innerText=lives; document.getElementById('level').innerText=level; }
    function hurtPlayer() {
        if(player.invincible>0) return;
        lives--; player.invincible=config.invFrames; player.vy=-8;
        playCustomSound('hurt');
        if(lives<=0) gameOver(false);
        updateHUD();
    }
    function gameOver(won){
        gameState='gameover';
        document.getElementById('goTitle').innerText=won?'🎉 Victoria!':'💔 Game Over';
        document.getElementById('goText').innerText=`Puntuación: ${score}`;
        document.getElementById('gameOverOverlay').classList.remove('hidden');
        stopBackgroundMusic();
    }
    function restartGame(){ startGame(currentDifficulty); }
    function backToMenu(){ location.reload(); } // simple
    function toggleMusicGlobal(){
        musicEnabled = !musicEnabled;
        document.getElementById('menuMuteBtn').innerHTML = musicEnabled ? '🔊 Música: ON' : '🔇 Música: OFF';
        document.getElementById('musicStatus').innerText = musicEnabled ? '🔊' : '🔇';
        if(!musicEnabled) stopBackgroundMusic();
        else if(gameState==='playing') startBackgroundMusic();
    }

    // Actualización de física y colisiones
    function updateGame() {
        if(gameState!=='playing') return;
        frameCount++;
        let left = keys['ArrowLeft']||keys['KeyA']||touch.left, right = keys['ArrowRight']||keys['KeyD']||touch.right;
        let run = keys['ShiftLeft']||keys['ShiftRight']||touch.run;
        let jump = keys['Space']||touch.jump;
        let speed = run ? config.runSpeed : config.baseSpeed;
        if(left){ player.vx=-speed; player.facingRight=false; }
        else if(right){ player.vx=speed; player.facingRight=true; }
        else player.vx*=0.8;
        if(jump && player.onGround){ player.vy=config.jump; player.onGround=false; playCustomSound('jump'); }
        player.vy+=config.gravity;
        player.x+=player.vx; player.y+=player.vy;
        if(player.x<0) player.x=0; if(player.x+player.width>canvas.width) player.x=canvas.width-player.width;
        player.onGround=false;
        if(currentLevelData){
            currentLevelData.platforms.forEach(plat=>{
                if(player.x<plat.x+plat.w && player.x+player.width>plat.x && player.y<plat.y+plat.h && player.y+player.height>plat.y){
                    if(player.vy>0 && player.y+player.height-player.vy<=plat.y+5){ player.y=plat.y-player.height; player.vy=0; player.onGround=true; }
                    else if(player.vy<0 && player.y-player.vy>=plat.y+plat.h-5){ player.y=plat.y+plat.h; player.vy=0; }
                    else if(player.vx>0){ player.x=plat.x-player.width; player.vx=0; }
                    else if(player.vx<0){ player.x=plat.x+plat.w; player.vx=0; }
                }
            });
            currentLevelData.spikes.forEach(sp=>{ if(player.x+10<sp.x+sp.w && player.x+player.width-10>sp.x && player.y+player.height>sp.y && player.y+player.height<sp.y+20) hurtPlayer(); });
            currentLevelData.apples.forEach(a=>{
                if(!a.collected && player.x<a.x+20 && player.x+player.width>a.x && player.y<a.y+20 && player.y+player.height>a.y){
                    a.collected=true; score+=10; playCustomSound('coin'); updateHUD();
                }
            });
            enemies.forEach(e=>{ e.update(); if(player.x<e.x+e.width-4 && player.x+player.width>e.x+4 && player.y<e.y+e.height-4 && player.y+player.height>e.y+4){
                if(player.vy>0 && player.y+player.height-player.vy<=e.y+10){ player.vy=config.jump*0.7; e.y=1000; score+=20; playCustomSound('coin'); updateHUD(); }
                else hurtPlayer();
            }});
            let goal = currentLevelData.goal;
            if(player.x<goal.x+30 && player.x+player.width>goal.x && player.y<goal.y+40 && player.y+player.height>goal.y){
                let allCollected = currentLevelData.apples.every(a=>a.collected);
                if(!config.requireAllApples || allCollected){
                    playCustomSound('win');
                    if(level >= config.levelSet.length) gameOver(true);
                    else loadLevel(level+1, config, config.levelSet);
                }
            }
        }
        if(player.y>canvas.height+50){
            if(config.dieOnFall) hurtPlayer();
            else { player.y=50; player.vy=0; player.x=40; }
        }
        if(player.invincible>0) player.invincible--;
    }
    function drawGame(){
        drawBackground();
        if(!currentLevelData) return;
        currentLevelData.platforms.forEach(p=>{ ctx.fillStyle='#8B4513'; ctx.fillRect(p.x,p.y,p.w,p.h); ctx.fillStyle='#32CD32'; ctx.fillRect(p.x,p.y,p.w,6); });
        currentLevelData.spikes.forEach(s=>{ ctx.fillStyle='#cc0000'; for(let i=0;i<s.w;i+=15){ ctx.beginPath(); ctx.moveTo(s.x+i,s.y+15); ctx.lineTo(s.x+i+7,s.y); ctx.lineTo(s.x+i+15,s.y+15); ctx.fill(); } });
        currentLevelData.apples.forEach(a=>{ if(!a.collected){ let bounce=Math.sin(frameCount*0.1)*3; drawApple(a.x,a.y,bounce); } });
        enemies.forEach(e=>e.draw());
        let g=currentLevelData.goal; ctx.fillStyle='#FFD700'; ctx.fillRect(g.x+20,g.y,4,40); ctx.fillStyle='#ff69b4'; ctx.fillRect(g.x+24,g.y,2,20);
        drawKitty(player.x,player.y,player.width,player.height,player.facingRight);
        let leftApples = currentLevelData.apples.filter(a=>!a.collected).length;
        ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(canvas.width/2-100,8,200,24);
        ctx.fillStyle='white'; ctx.font='bold 12px monospace'; ctx.fillText(`🍎 ${leftApples} restantes`, canvas.width/2-80,24);
    }
    function gameLoop(){ updateGame(); drawGame(); requestAnimationFrame(gameLoop); }

    // ==================== CONTROL TOUCH / TECLADO ====================
    function attachControls(){
        const btns = ['up','jump','left','down','right','run'];
        btns.forEach(b=>{ let el=document.getElementById('btn'+b.charAt(0).toUpperCase()+b.slice(1));
            if(el) el.addEventListener('mousedown',(e)=>{ e.preventDefault(); touch[b]=true; el.classList.add('active'); });
            if(el) el.addEventListener('mouseup',()=>{ touch[b]=false; el.classList.remove('active'); });
            if(el) el.addEventListener('touchstart',(e)=>{ e.preventDefault(); touch[b]=true; el.classList.add('active'); });
            if(el) el.addEventListener('touchend',()=>{ touch[b]=false; el.classList.remove('active'); });
        });
        window.addEventListener('keydown',e=>{ keys[e.code]=true; if(e.code==='KeyM') toggleMusicGlobal(); if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','ShiftLeft','ShiftRight','KeyW','KeyA','KeyS','KeyD'].includes(e.code)) e.preventDefault(); });
        window.addEventListener('keyup',e=>{ keys[e.code]=false; });
    }

    // Inicialización del menú y eventos
    window.onload = () => {
        loadCustomImages();
        attachControls();
        document.getElementById('easyModeBtn').onclick = () => startGame('easy');
        document.getElementById('hardModeBtn').onclick = () => startGame('hard');
        document.getElementById('menuMuteBtn').onclick = toggleMusicGlobal;
        // brillitos
        for(let i=0;i<60;i++){ let s=document.createElement('div'); s.className='sparkle'; s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%'; s.style.animationDelay=Math.random()*3+'s'; document.getElementById('sparklesContainer').appendChild(s); }
        gameLoop();
    };
</script>
